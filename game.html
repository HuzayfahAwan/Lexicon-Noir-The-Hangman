<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lexicon Noir — Play</title>
  <link rel="icon" href="icon.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.1/css/bulma.min.css"/>
  <link href="game.css" rel="stylesheet" type="text/css"/>
</head>

<body>

  <!-- Confetti Canvas (fixed overlay, pointer-events none) -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Toast Notifications -->
  <div id="toast-container"></div>

  <section id="body" class="hero is-black is-fullheight">

    <!-- Navbar -->
    <div class="hero-head">
      <header class="navbar is-justify-content-space-between">
        <div id="gohomediv" class="is-flex is-justify-content-flex-start navbar-brand">
          <button id="go-home-btn" class="nav-home-btn">&#8592; Home</button>
        </div>
        <div id="flippingalphabet" class="is-flex is-justify-content-center">
          <div id="alphabetdiv">
            <span style="--i:1">a</span><span style="--i:2">b</span><span style="--i:3">c</span>
            <span style="--i:4">d</span><span style="--i:5">e</span><span style="--i:6">f</span>
            <span style="--i:7">g</span><span style="--i:8">h</span><span style="--i:9">i</span>
            <span style="--i:10">j</span><span style="--i:11">k</span><span style="--i:12">l</span>
            <span style="--i:13">m</span><span style="--i:14">n</span><span style="--i:15">o</span>
            <span style="--i:16">p</span><span style="--i:17">q</span><span style="--i:18">r</span>
            <span style="--i:19">s</span><span style="--i:20">t</span><span style="--i:21">u</span>
            <span style="--i:22">v</span><span style="--i:23">w</span><span style="--i:24">x</span>
            <span style="--i:25">y</span><span style="--i:26">z</span>
          </div>
        </div>
        <div id="nav-right" class="is-flex is-align-items-center">
          <span id="category-display" class="nav-badge"></span>
          <span class="nav-sep">&nbsp;&middot;&nbsp;</span>
          <span id="difficulty-display" class="nav-badge"></span>
          <span class="nav-sep">&nbsp;&middot;&nbsp;</span>
          <span id="mode-display" class="nav-badge mode-badge"></span>
        </div>
      </header>
    </div>

    <!-- Stats Bar -->
    <div id="stats-bar">
      <div class="stat-item">
        <span class="stat-label">WINS</span>
        <span class="stat-value wins" id="stat-wins">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-label">LOSSES</span>
        <span class="stat-value losses" id="stat-losses">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-label">STREAK</span>
        <span class="stat-value streak" id="stat-streak">0</span>
      </div>
      <div class="stat-divider"></div>
      <div class="stat-item">
        <span class="stat-label">BEST</span>
        <span class="stat-value best" id="stat-best">0</span>
      </div>
    </div>

    <!-- Main Game Area -->
    <div id="game-area" class="hero-body">

      <!-- Left Column: Hangman + Controls -->
      <div id="hangman-column">

        <svg id="hangman-svg" viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
          <!-- Gallows -->
          <line x1="20"  y1="245" x2="180" y2="245" class="gallows" style="--delay:0s"/>
          <line x1="60"  y1="245" x2="60"  y2="15"  class="gallows" style="--delay:0.15s"/>
          <line x1="60"  y1="15"  x2="135" y2="15"  class="gallows" style="--delay:0.35s"/>
          <line x1="135" y1="15"  x2="135" y2="48"  class="gallows" style="--delay:0.55s"/>
          <!-- Body Parts -->
          <circle id="head"       cx="135" cy="68" r="20"              class="body-part"/>
          <line   id="body"       x1="135" y1="88"  x2="135" y2="158" class="body-part"/>
          <line   id="left-arm"   x1="135" y1="108" x2="105" y2="138" class="body-part"/>
          <line   id="right-arm"  x1="135" y1="108" x2="165" y2="138" class="body-part"/>
          <line   id="left-leg"   x1="135" y1="158" x2="110" y2="205" class="body-part"/>
          <line   id="right-leg"  x1="135" y1="158" x2="160" y2="205" class="body-part"/>
          <line   id="left-foot"  x1="110" y1="205" x2="90"  y2="215" class="body-part"/>
          <line   id="right-foot" x1="160" y1="205" x2="180" y2="215" class="body-part"/>
        </svg>

        <!-- Timer (shown in timed mode) -->
        <div id="timer-section" class="is-hidden">
          <div id="timer-bar-track"><div id="timer-bar"></div></div>
          <span id="timer-display">90s</span>
        </div>

        <div id="wrong-display">
          <span class="wrong-label">WRONG</span>
          <span id="wrong-counter">0 / 6</span>
        </div>

        <button id="hint-btn">USE HINT &nbsp;<span class="shortcut-key">H</span></button>
        <p class="hint-subtext">Reveals a letter &mdash; costs 1 life</p>

      </div>

      <!-- Right Column: Word + Alphabet -->
      <div id="word-column">

        <div id="word-display">
          <div id="letterondash">
            <div id="dashesflex"></div>
            <div id="lettersflex"></div>
          </div>
        </div>

        <div id="result-message" class="is-hidden"></div>

        <div id="alphabet-grid"></div>

        <div id="action-buttons">
          <button id="play-again-btn" class="is-hidden">PLAY AGAIN &nbsp;<span class="shortcut-key">&#x23CE;</span></button>
          <button id="share-btn"      class="is-hidden">SHARE RESULT</button>
        </div>

      </div>
    </div>

    <!-- Word Definition (shown on loss) -->
    <div id="definition-section" class="is-hidden"></div>

  </section>

  <script src="game.js" defer></script>

</body>
</html>
